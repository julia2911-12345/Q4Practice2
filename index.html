<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Q4 Practice 2</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"; rel="stylesheet">

</head>
<body>

<h1>Switch Statements</h1>

<button class="btn btn-info" onclick = "teamRank()">Rank</button>

<script>
	function teamRank(){
	var rank = "1st";

	var message = "";

	switch (true){
		case (rank === "1st"): //compare
			message = "Champions!";
			break;
		case (rank === "2nd"): //compare
			message = "Second Placer!";
			break;
		case (rank === "3rd"): //compare
			message = "Third Placer!";
			break;
		case (rank === "4th"): //compare
			message = "Fourth Placer!";
			break;
		default:
			message = "Rank is not available at this time.";

	}
	alert(message);
}


	let team = "yellow"; //string

	switch (team){
	case "yellow":
		alert("Go Yellow Tigers! Top 1!");
		break;
	case "Blue":
		alert("Go Blue Bears!");
		break;

	case "Red":
		alert("Go Red Bulldogs!");
		break;
	case "Green":
		alert("Go Green Hornets!");
		break;
	default:
		alert("Team could not be determined.");
	}
</script>

</body>
</html>
